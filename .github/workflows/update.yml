name: 커뮤니티 보드 자동 갱신

on:
  schedule:
    # 한국시간(KST) 09:00, 12:00, 16:00 = UTC 00:00, 03:00, 07:00
    - cron: "0 0 * * *"
    - cron: "0 3 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:            # '지금 실행' 버튼으로 수동 실행도 가능
  push:
    branches: [ main ]          # 파일 올리면 즉시 한 번 실행

permissions:
  contents: write               # index.html을 다시 저장(커밋)할 권한

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 커뮤니티 방문 → index.html 생성
        run: python scraper.py --out index.html

      - name: 변경사항 저장(커밋)
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_checked.txt   # 매 실행 흔적(길1 자체 깨우기)
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add index.html last_checked.txt
          git commit -m "자동 갱신: 커뮤니티 보드" || echo "변경 없음 — 커밋 생략"
          git push || echo "push 생략"
